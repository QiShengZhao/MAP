<!DOCTYPE html>
<html lang="zh"><head>
<meta charset="utf-8"><title>Agent Platform Console</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/css/console.css">
</head><body>

<!-- ═══ 登录 ═══ -->
<div id="login">
  <h1>Agent Platform</h1>
  <input id="loginEmail" placeholder="email" autocomplete="username">
  <input id="loginPwd" type="password" placeholder="password" autocomplete="current-password">
  <div class="row">
    <button onclick="Auth.login()">登录</button>
    <button class="ghost" onclick="Auth.register()">注册租户</button>
  </div>
  <div id="loginErr" class="err-text"></div>
</div>

<!-- ═══ Header + 主导航 ═══ -->
<header class="hidden">
  <h1>⚙️ Agent Console</h1>
  <nav id="mainNav">
    <a href="#/chat" data-view="chat">💬 对话</a>
    <a href="#/ops/runs" data-view="ops" class="admin-only">⚙️ 运维</a>
    <a href="#/risk/rules" data-view="risk" class="admin-only">🛡️ 风控</a>
    <a href="#/config/policy" data-view="config">🔧 配置</a>
  </nav>
  <select id="wsSel" onchange="Chat.onWorkspaceChange()"></select>
  <span id="runBadge" class="badge">idle</span>
  <div class="spacer"></div>
  <span id="who" class="dim"></span>
  <button class="ghost" onclick="Auth.logout()">退出</button>
</header>

<!-- ═══ 全局 banner（租户暂停 / 预算）═══ -->
<div id="tenantBanner" class="banner"></div>
<div id="budgetBanner" class="banner"></div>

<!-- ═══ 视图容器 ═══ -->
<main class="hidden">
  <!-- 对话页（默认） -->
  <div id="view-chat" class="view">
    <div class="col" id="sessCol">
      <h3>Sessions <button class="ghost mini" onclick="Chat.newSession()">+</button></h3>
      <div id="sessList"></div>
    </div>
    <div id="chatMain">
      <div id="msgs"></div>
      <div id="composer">
        <textarea id="input" placeholder="输入任务… (Ctrl+Enter 发送)"></textarea>
        <div class="btn-col">
          <button id="sendBtn" onclick="Chat.send()">发送</button>
          <button id="btnPause" class="ghost admin-only hidden" onclick="Chat.pauseRun()">⏸ 暂停</button>
          <button id="btnResume" class="ghost admin-only hidden" onclick="Chat.resumeRun()">▶ 恢复</button>
          <button id="btnCancel" class="danger hidden" onclick="Chat.cancelRun()">终止</button>
        </div>
      </div>
    </div>
    <div class="col side">
      <section><h3>用量 / 预算</h3><div id="usage"></div></section>
      <section><h3>产物 Artifacts</h3><div id="artifacts"></div></section>
      <section><h3>待审批</h3><div id="approvals"></div></section>
    </div>
  </div>

  <!-- 运维 / 风控 / 配置（模块自渲染） -->
  <div id="view-ops"    class="view hidden"><div class="subnav" id="opsNav"></div><div class="content" id="opsContent"></div></div>
  <div id="view-risk"   class="view hidden"><div class="subnav" id="riskNav"></div><div class="content" id="riskContent"></div></div>
  <div id="view-config" class="view hidden"><div class="subnav" id="cfgNav"></div><div class="content" id="cfgContent"></div></div>
</main>

<!-- ═══ 审批弹窗（复用既有样式）═══ -->
<dialog id="apvDlg">
  <h3 class="warn-title">⚠️ 高风险操作待审批</h3>
  <p id="apvTool"></p><pre id="apvArgs"></pre>
  <div class="row right">
    <button class="ghost" onclick="Chat.decide(false)">拒绝</button>
    <button onclick="Chat.decide(true)">批准</button>
  </div>
</dialog>

<!-- ═══ 通用 Modal / Toast 容器 ═══ -->
<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script src="/js/api.js"></script>
<script src="/js/components.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/ops.js"></script>
<script src="/js/risk.js"></script>
<script src="/js/billing.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
</body></html>
