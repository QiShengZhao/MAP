services:
  api:
    build: .
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [postgres, redis, minio]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
  worker:
    build: .
    env_file: .env
    depends_on: [postgres, redis, minio]
    command: python -m app.execution.worker
    deploy: { replicas: 3 }
  scheduler:
    build: .
    env_file: .env
    depends_on: [redis]
    command: python -m app.scheduling.scheduler
  sandbox-reaper:
    build: .
    env_file: .env
    command: python -m app.runtime.sandbox_reaper
  billing-reporter:
    build: .
    env_file: .env
    command: python -m app.platform_services.billing_reporter
  burn-monitor:
    build: .
    env_file: .env
    command: python -m app.platform_services.burn_monitor
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_platform
    volumes: ["pgdata:/var/lib/postgresql/data"]
    ports: ["5432:5432"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on: [kafka]
    ports: ["8081:8081"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
  event-relay:
    build: .
    env_file: .env
    environment:
      EVENT_BUS: kafka
      EVENT_SERIALIZATION: avro
      RELAY_MIRROR_JSON: "true"
      KAFKA_BOOTSTRAP: kafka:29092
    command: python -m app.eventbus.relay_consumer
    depends_on: [kafka, schema-registry, redis]
    deploy: { replicas: 2 }
  audit-writer:
    build: .
    env_file: .env
    environment:
      EVENT_BUS: kafka
      KAFKA_BOOTSTRAP: kafka:29092
    command: python -m app.eventbus.audit_consumer
    depends_on: [kafka, schema-registry, postgres]
    deploy: { replicas: 2 }
  risk-consumer:
    build: .
    env_file: .env
    environment:
      EVENT_BUS: kafka
      KAFKA_BOOTSTRAP: kafka:29092
    command: python -m app.eventbus.risk_consumer
    depends_on: [kafka, redis, postgres]
  flink-jobmanager:
    build: { context: ., dockerfile: flink/Dockerfile }
    command: jobmanager
    ports: ["8082:8081"]
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        execution.checkpointing.interval: 30s
        restart-strategy.type: exponential-delay
        restart-strategy.exponential-delay.max-backoff: 60s
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
    depends_on: [kafka]
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8081/overview"]
      interval: 10s
      timeout: 5s
      retries: 12
  flink-taskmanager:
    build: { context: ., dockerfile: flink/Dockerfile }
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 1728m
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
    depends_on: [flink-jobmanager]
    deploy: { replicas: 1 }
  flink-submit:
    build: { context: ., dockerfile: flink/Dockerfile }
    depends_on:
      flink-jobmanager: { condition: service_healthy }
      kafka: { condition: service_started }
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        if curl -fs http://flink-jobmanager:8081/jobs/overview \
           | grep -q '"name":"risk-metric-aggregation".*"state":"RUNNING"'; then
          echo "job already running, skip submit"; exit 0
        fi
        flink run --detached \
          --jobmanager flink-jobmanager:8081 \
          --python /opt/jobs/risk_job.py \
          -- --kafka-bootstrap kafka:29092 --source-topic run-events-json
        echo "risk job submitted"
    restart: "no"
  tests:
    build: .
    command: pytest
    profiles: [test]
    environment:
      ENV: test
      EVENT_BUS: redis
      SANDBOX_BACKEND: local
      JWT_SECRET: test-secret-key-at-least-32-bytes-long!!
      DATABASE_URL: sqlite+aiosqlite:///:memory:
volumes:
  pgdata: {}
  miniodata: {}
  flink-checkpoints: {}
