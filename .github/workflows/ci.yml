name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/ -q --cov=app --cov-report=term-missing

  smoke:
    name: compose smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment
        run: cp .env.example .env

      - name: Start core services
        run: docker compose up -d postgres redis minio

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U agent -d agent_platform && exit 0
            sleep 2
          done
          echo "postgres not ready"
          exit 1

      - name: Migrate database
        run: docker compose run --rm api python scripts/init_db.py

      - name: Start API
        run: docker compose up -d api

      - name: Smoke test /healthz
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/healthz; then
              exit 0
            fi
            sleep 2
          done
          echo "API health check failed"
          docker compose logs --no-color api
          exit 1

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color
