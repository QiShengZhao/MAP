name: CI/CD

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest tests/ -q --cov=app --cov-report=term-missing --cov-fail-under=40

  postgres-security:
    name: PostgreSQL RLS
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agent_admin
          POSTGRES_PASSWORD: agent_admin
          POSTGRES_DB: agent_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agent_admin -d agent_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://agent_admin:agent_admin@localhost:5432/agent_platform
      RLS_DATABASE_URL: postgresql://agent_runtime:agent_runtime@localhost:5432/agent_platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Create non-privileged runtime role
        env:
          PGPASSWORD: agent_admin
        run: >-
          psql -h localhost -U agent_admin -d agent_platform
          -v ON_ERROR_STOP=1 -f deploy/postgres-init.sql
      - name: Apply migrations
        run: python scripts/init_db.py
      - name: Verify forced tenant isolation
        run: python scripts/check_rls.py

  image:
    name: Container image
    runs-on: ubuntu-latest
    needs: [test, postgres-security]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Normalize image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish GHCR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [test, postgres-security, image]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Normalize image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke:
    name: compose smoke
    runs-on: ubuntu-latest
    needs: [test, postgres-security]
    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment
        run: cp .env.example .env

      - name: Start core services
        run: docker compose up -d postgres redis minio

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U agent_admin -d agent_platform && exit 0
            sleep 2
          done
          echo "postgres not ready"
          exit 1

      - name: Migrate database
        run: docker compose --profile tools run --rm db-migrate

      - name: Start API
        run: docker compose up -d api

      - name: Smoke test /healthz
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/healthz; then
              exit 0
            fi
            sleep 2
          done
          echo "API health check failed"
          docker compose logs --no-color api
          exit 1

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color
